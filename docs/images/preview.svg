<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1222;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2744;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="robotGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="800" fill="url(#bgGradient)"/>
  
  <!-- Header -->
  <rect x="0" y="0" width="1200" height="60" fill="#0c1222" stroke="#1e3a5f" stroke-width="1"/>
  <text x="40" y="38" fill="#3b82f6" font-family="monospace" font-size="20" font-weight="bold">🤖 Humanoid RL</text>
  <text x="280" y="38" fill="#94a3b8" font-family="monospace" font-size="14">Deep Reinforcement Learning for Robot Locomotion</text>
  
  <!-- Left: Physics Simulation -->
  <rect x="20" y="80" width="560" height="450" fill="#0f172a" rx="10" ry="10" stroke="#1e3a5f" stroke-width="2"/>
  <text x="40" y="115" fill="#3b82f6" font-family="Arial, sans-serif" font-size="18" font-weight="bold">🏃 MuJoCo 物理仿真</text>
  
  <!-- Ground -->
  <rect x="40" y="480" width="520" height="30" fill="#1e293b" rx="3" ry="3"/>
  <line x1="40" y1="480" x2="560" y2="480" stroke="#3b82f6" stroke-width="2"/>
  
  <!-- Grid pattern -->
  <g stroke="#1e3a5f" stroke-width="0.5" opacity="0.3">
    <line x1="40" y1="300" x2="560" y2="300"/>
    <line x1="40" y1="350" x2="560" y2="350"/>
    <line x1="40" y1="400" x2="560" y2="400"/>
    <line x1="40" y1="450" x2="560" y2="450"/>
    <line x1="140" y1="130" x2="140" y2="480"/>
    <line x1="240" y1="130" x2="240" y2="480"/>
    <line x1="340" y1="130" x2="340" y2="480"/>
    <line x1="440" y1="130" x2="440" y2="480"/>
  </g>
  
  <!-- Humanoid Robot -->
  <g transform="translate(280, 200)">
    <!-- Head -->
    <ellipse cx="0" cy="0" rx="25" ry="28" fill="url(#robotGradient)" filter="url(#glow)"/>
    <circle cx="-8" cy="-5" r="4" fill="#60a5fa"/>
    <circle cx="8" cy="-5" r="4" fill="#60a5fa"/>
    <rect x="-10" y="8" width="20" height="4" rx="2" ry="2" fill="#1e3a5f"/>
    
    <!-- Torso -->
    <rect x="-30" y="28" width="60" height="80" rx="10" ry="10" fill="url(#robotGradient)"/>
    <circle cx="0" cy="55" r="8" fill="#10b981">
      <animate attributeName="fill" values="#10b981;#3b82f6;#10b981" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Left Arm -->
    <rect x="-55" y="35" width="20" height="50" rx="5" ry="5" fill="#2563eb" transform="rotate(-20 -45 60)"/>
    <rect x="-65" y="75" width="18" height="45" rx="5" ry="5" fill="#1d4ed8" transform="rotate(-30 -56 97)"/>
    
    <!-- Right Arm -->
    <rect x="35" y="35" width="20" height="50" rx="5" ry="5" fill="#2563eb" transform="rotate(20 45 60)"/>
    <rect x="47" y="75" width="18" height="45" rx="5" ry="5" fill="#1d4ed8" transform="rotate(30 56 97)"/>
    
    <!-- Left Leg -->
    <rect x="-25" y="108" width="18" height="60" rx="5" ry="5" fill="#2563eb" transform="rotate(-10 -16 138)"/>
    <rect x="-30" y="165" width="22" height="15" rx="5" ry="5" fill="#1e40af"/>
    
    <!-- Right Leg -->
    <rect x="7" y="108" width="18" height="60" rx="5" ry="5" fill="#2563eb" transform="rotate(10 16 138)"/>
    <rect x="8" y="165" width="22" height="15" rx="5" ry="5" fill="#1e40af"/>
  </g>
  
  <!-- Motion Trail -->
  <g opacity="0.3">
    <circle cx="200" cy="475" r="8" fill="#3b82f6"/>
    <circle cx="230" cy="475" r="6" fill="#3b82f6"/>
    <circle cx="255" cy="475" r="4" fill="#3b82f6"/>
    <circle cx="350" cy="475" r="4" fill="#3b82f6"/>
    <circle cx="375" cy="475" r="6" fill="#3b82f6"/>
    <circle cx="405" cy="475" r="8" fill="#3b82f6"/>
  </g>
  
  <!-- Velocity Vector -->
  <line x1="300" y1="380" x2="380" y2="380" stroke="#10b981" stroke-width="3" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
  </defs>
  <text x="320" y="370" fill="#10b981" font-family="monospace" font-size="12">v = 2.5 m/s</text>
  
  <!-- Info Panel -->
  <rect x="40" y="140" width="120" height="80" fill="#0c1222" rx="5" ry="5" stroke="#1e3a5f" stroke-width="1"/>
  <text x="55" y="165" fill="#94a3b8" font-family="monospace" font-size="10">算法</text>
  <text x="55" y="185" fill="#f59e0b" font-family="monospace" font-size="14" font-weight="bold">PPO</text>
  <text x="55" y="210" fill="#94a3b8" font-family="monospace" font-size="10">物理引擎</text>
  <text x="55" y="230" fill="#3b82f6" font-family="monospace" font-size="12" font-weight="bold">MuJoCo</text>
  
  <!-- Right Top: Training Dashboard -->
  <rect x="600" y="80" width="580" height="250" fill="#0f172a" rx="10" ry="10" stroke="#1e3a5f" stroke-width="2"/>
  <text x="620" y="115" fill="#3b82f6" font-family="Arial, sans-serif" font-size="18" font-weight="bold">📊 训练监控</text>
  
  <!-- Stats Cards -->
  <g transform="translate(620, 135)">
    <rect width="120" height="70" fill="#0c1222" rx="5" ry="5" stroke="#10b981" stroke-width="1"/>
    <text x="60" y="25" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">平均奖励</text>
    <text x="60" y="55" fill="#10b981" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">+2,847</text>
  </g>
  
  <g transform="translate(755, 135)">
    <rect width="120" height="70" fill="#0c1222" rx="5" ry="5" stroke="#f59e0b" stroke-width="1"/>
    <text x="60" y="25" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">回合数</text>
    <text x="60" y="55" fill="#f59e0b" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">10K</text>
  </g>
  
  <g transform="translate(890, 135)">
    <rect width="120" height="70" fill="#0c1222" rx="5" ry="5" stroke="#8b5cf6" stroke-width="1"/>
    <text x="60" y="25" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">成功率</text>
    <text x="60" y="55" fill="#8b5cf6" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">89%</text>
  </g>
  
  <g transform="translate(1025, 135)">
    <rect width="130" height="70" fill="#0c1222" rx="5" ry="5" stroke="#ef4444" stroke-width="1"/>
    <text x="65" y="25" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">速度 (m/s)</text>
    <text x="65" y="55" fill="#ef4444" font-family="monospace" font-size="20" font-weight="bold" text-anchor="middle">2.5</text>
  </g>
  
  <!-- Reward Chart -->
  <text x="620" y="235" fill="#94a3b8" font-family="monospace" font-size="12">奖励曲线</text>
  <rect x="620" y="245" width="540" height="70" fill="#0c1222" rx="3" ry="3"/>
  
  <!-- Axes -->
  <line x1="630" y1="305" x2="1150" y2="305" stroke="#1e3a5f" stroke-width="1"/>
  <line x1="630" y1="250" x2="630" y2="305" stroke="#1e3a5f" stroke-width="1"/>
  
  <!-- Curve -->
  <path d="M 630 295 Q 700 285 770 270 T 910 245 T 1050 230 T 1150 225" fill="none" stroke="#10b981" stroke-width="2"/>
  <path d="M 630 295 Q 700 288 770 278 T 910 260 T 1050 250 T 1150 245" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4,2"/>
  
  <!-- Legend -->
  <rect x="640" y="255" width="12" height="2" fill="#10b981"/>
  <text x="660" y="260" fill="#94a3b8" font-family="monospace" font-size="9">PPO</text>
  <rect x="720" y="255" width="12" height="2" fill="#3b82f6"/>
  <text x="740" y="260" fill="#94a3b8" font-family="monospace" font-size="9">SAC</text>
  
  <!-- Bottom Left: Algorithm Comparison -->
  <rect x="20" y="550" width="560" height="230" fill="#0f172a" rx="10" ry="10" stroke="#1e3a5f" stroke-width="2"/>
  <text x="40" y="585" fill="#3b82f6" font-family="Arial, sans-serif" font-size="18" font-weight="bold">⚡ 算法对比</text>
  
  <!-- Comparison Table -->
  <rect x="40" y="600" width="520" height="30" fill="#0c1222" rx="3" ry="3"/>
  <text x="70" y="620" fill="#94a3b8" font-family="monospace" font-size="12" font-weight="bold">算法</text>
  <text x="200" y="620" fill="#94a3b8" font-family="monospace" font-size="12" font-weight="bold">平均奖励</text>
  <text x="340" y="620" fill="#94a3b8" font-family="monospace" font-size="12" font-weight="bold">收敛速度</text>
  <text x="480" y="620" fill="#94a3b8" font-family="monospace" font-size="12" font-weight="bold">稳定性</text>
  
  <rect x="40" y="635" width="520" height="30" fill="#064e3b" rx="3" ry="3"/>
  <text x="70" y="655" fill="#10b981" font-family="monospace" font-size="12" font-weight="bold">PPO</text>
  <text x="200" y="655" fill="#fff" font-family="monospace" font-size="12">+2,847 🏆</text>
  <text x="340" y="655" fill="#fff" font-family="monospace" font-size="12">快</text>
  <text x="480" y="655" fill="#fff" font-family="monospace" font-size="12">高</text>
  
  <rect x="40" y="670" width="520" height="30" fill="#1e3a5f" rx="3" ry="3"/>
  <text x="70" y="690" fill="#3b82f6" font-family="monospace" font-size="12" font-weight="bold">SAC</text>
  <text x="200" y="690" fill="#fff" font-family="monospace" font-size="12">+2,456</text>
  <text x="340" y="690" fill="#fff" font-family="monospace" font-size="12">中</text>
  <text x="480" y="690" fill="#fff" font-family="monospace" font-size="12">中</text>
  
  <rect x="40" y="705" width="520" height="30" fill="#1e293b" rx="3" ry="3"/>
  <text x="70" y="725" fill="#f59e0b" font-family="monospace" font-size="12" font-weight="bold">TD3</text>
  <text x="200" y="725" fill="#fff" font-family="monospace" font-size="12">+2,189</text>
  <text x="340" y="725" fill="#fff" font-family="monospace" font-size="12">慢</text>
  <text x="480" y="725" fill="#fff" font-family="monospace" font-size="12">高</text>
  
  <!-- Bottom Right: Architecture -->
  <rect x="600" y="350" width="580" height="430" fill="#0f172a" rx="10" ry="10" stroke="#1e3a5f" stroke-width="2"/>
  <text x="620" y="385" fill="#3b82f6" font-family="Arial, sans-serif" font-size="18" font-weight="bold">🏗️ 项目架构</text>
  
  <!-- Architecture Diagram -->
  <g transform="translate(620, 410)">
    <!-- Input -->
    <rect x="0" y="0" width="150" height="50" fill="#1e3a5f" rx="5" ry="5" stroke="#3b82f6" stroke-width="2"/>
    <text x="75" y="20" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">环境状态</text>
    <text x="75" y="38" fill="#3b82f6" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">Observations</text>
    
    <!-- Arrow -->
    <line x1="150" y1="25" x2="190" y2="25" stroke="#64748b" stroke-width="2"/>
    <polygon points="185,20 195,25 185,30" fill="#64748b"/>
    
    <!-- Preprocessing -->
    <rect x="190" y="0" width="150" height="50" fill="#1e3a5f" rx="5" ry="5" stroke="#8b5cf6" stroke-width="2"/>
    <text x="265" y="20" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">数据预处理</text>
    <text x="265" y="38" fill="#8b5cf6" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">Normalization</text>
    
    <!-- Arrow -->
    <line x1="340" y1="25" x2="380" y2="25" stroke="#64748b" stroke-width="2"/>
    <polygon points="375,20 385,25 375,30" fill="#64748b"/>
    
    <!-- Policy Network -->
    <rect x="380" y="0" width="150" height="50" fill="#064e3b" rx="5" ry="5" stroke="#10b981" stroke-width="2"/>
    <text x="455" y="20" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">策略网络</text>
    <text x="455" y="38" fill="#10b981" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">Policy π</text>
  </g>
  
  <g transform="translate(620, 480)">
    <!-- Value Network -->
    <rect x="0" y="0" width="150" height="50" fill="#451a03" rx="5" ry="5" stroke="#f59e0b" stroke-width="2"/>
    <text x="75" y="20" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">价值网络</text>
    <text x="75" y="38" fill="#f59e0b" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">Value V</text>
    
    <!-- Arrow -->
    <line x1="150" y1="25" x2="190" y2="25" stroke="#64748b" stroke-width="2"/>
    <polygon points="185,20 195,25 185,30" fill="#64748b"/>
    
    <!-- Action -->
    <rect x="190" y="0" width="150" height="50" fill="#7c2d12" rx="5" ry="5" stroke="#ef4444" stroke-width="2"/>
    <text x="265" y="20" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">输出动作</text>
    <text x="265" y="38" fill="#ef4444" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">Actions</text>
    
    <!-- Arrow -->
    <line x1="340" y1="25" x2="380" y2="25" stroke="#64748b" stroke-width="2"/>
    <polygon points="375,20 385,25 375,30" fill="#64748b"/>
    
    <!-- Environment -->
    <rect x="380" y="0" width="150" height="50" fill="#1e3a5f" rx="5" ry="5" stroke="#3b82f6" stroke-width="2"/>
    <text x="455" y="20" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle">物理环境</text>
    <text x="455" y="38" fill="#3b82f6" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle">MuJoCo</text>
  </g>
  
  <!-- Feedback Loop -->
  <path d="M 1150 435 Q 1180 435 1180 505 Q 1180 575 1150 575" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="1145,570 1155,575 1145,580" fill="#f59e0b"/>
  <text x="1160" y="510" fill="#f59e0b" font-family="monospace" font-size="10" transform="rotate(90 1160 510)">奖励 r</text>
  
  <!-- Supported Envs -->
  <text x="620" y="570" fill="#94a3b8" font-family="monospace" font-size="12">支持的物理引擎</text>
  <g transform="translate(620, 585)">
    <rect width="100" height="35" fill="#0c1222" rx="5" ry="5" stroke="#3b82f6" stroke-width="1"/>
    <text x="50" y="23" fill="#3b82f6" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">MuJoCo</text>
  </g>
  <g transform="translate(730, 585)">
    <rect width="100" height="35" fill="#0c1222" rx="5" ry="5" stroke="#f59e0b" stroke-width="1"/>
    <text x="50" y="23" fill="#f59e0b" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">PyBullet</text>
  </g>
  <g transform="translate(840, 585)">
    <rect width="100" height="35" fill="#0c1222" rx="5" ry="5" stroke="#8b5cf6" stroke-width="1"/>
    <text x="50" y="23" fill="#8b5cf6" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle">Isaac Gym</text>
  </g>
  
  <!-- Features -->
  <text x="620" y="650" fill="#94a3b8" font-family="monospace" font-size="12">核心特性</text>
  <g transform="translate(620, 665)">
    <rect width="16" height="16" fill="#064e3b" rx="3" ry="3"/>
    <text x="26" y="13" fill="#10b981" font-family="Arial, sans-serif" font-size="11">✅ 多算法支持 (PPO/SAC/TD3)</text>
  </g>
  <g transform="translate(620, 690)">
    <rect width="16" height="16" fill="#064e3b" rx="3" ry="3"/>
    <text x="26" y="13" fill="#10b981" font-family="Arial, sans-serif" font-size="11">✅ 多物理引擎兼容</text>
  </g>
  <g transform="translate(620, 715)">
    <rect width="16" height="16" fill="#064e3b" rx="3" ry="3"/>
    <text x="26" y="13" fill="#10b981" font-family="Arial, sans-serif" font-size="11">✅ 训练可视化工具</text>
  </g>
  <g transform="translate(850, 665)">
    <rect width="16" height="16" fill="#064e3b" rx="3" ry="3"/>
    <text x="26" y="13" fill="#10b981" font-family="Arial, sans-serif" font-size="11">✅ 检查点自动保存</text>
  </g>
  <g transform="translate(850, 690)">
    <rect width="16" height="16" fill="#064e3b" rx="3" ry="3"/>
    <text x="26" y="13" fill="#10b981" font-family="Arial, sans-serif" font-size="11">✅ 视频录制回放</text>
  </g>
  <g transform="translate(850, 715)">
    <rect width="16" height="16" fill="#064e3b" rx="3" ry="3"/>
    <text x="26" y="13" fill="#10b981" font-family="Arial, sans-serif" font-size="11">✅ TensorBoard 集成</text>
  </g>
</svg>
